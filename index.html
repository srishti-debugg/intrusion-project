<!DOCTYPE html>
<html>
<head>
    <title>Intrusion Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; text-align: center; margin-top: 50px; }
        input { padding: 10px; margin: 5px; }
        button { padding: 10px; }
    </style>
</head>
<body>

<h1>🔐 Intrusion Detection System</h1>

<input id="f1" placeholder="Feature 1">
<input id="f2" placeholder="Feature 2">
<input id="f3" placeholder="Feature 3">

<br><br>

<button onclick="predict()">Check</button>

<h2 id="result"></h2>

<script>
function predict() {
    let data = [
        Number(document.getElementById("f1").value),
        Number(document.getElementById("f2").value),
        Number(document.getElementById("f3").value)
    ];

    fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({features: data})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText = data.message;
    });
}
</script>

</body>
</html>
